<style>
    .glass-effect {
      background: rgba(30, 30, 30, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .icon-glow:hover {
      text-shadow: 0 0 10px rgba(0, 209, 255, 0.8);

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>

<body class="bg-background text-on-surface font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-gradient-to-b from-surface/80 to-transparent flex justify-between items-center px-gutter py-4">
<div class="flex items-center gap-2">

</div>
<div class="flex items-center gap-6">
<span class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity cursor-pointer" data-icon="search">search</span>
</div>
</header>

<main class="h-screen w-full overflow-y-scroll snap-y snap-mandatory no-scrollbar relative bg-surface">
<!-- Reel 1 -->
<section class="h-screen w-full snap-start relative overflow-hidden flex flex-col justify-end">

<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-black/40"></div>
</div>

<div class="absolute right-gutter bottom-32 z-20 flex flex-col items-center gap-8">
<div class="flex flex-col items-center gap-1 group cursor-pointer active:scale-95 duration-200">
<div class="p-3 rounded-full bg-white/5 backdrop-blur-md border border-white/10 group-hover:border-primary/50 transition-all">
<span class="material-symbols-outlined text-white icon-glow" data-icon="favorite">favorite</span>
</div>
<span class="font-label-caps text-label-caps text-white">4.2K</span>
</div>
<div class="flex flex-col items-center gap-1 group cursor-pointer active:scale-95 duration-200">
<div class="p-3 rounded-full bg-white/5 backdrop-blur-md border border-white/10 group-hover:border-primary/50 transition-all">
<span class="material-symbols-outlined text-white icon-glow" data-icon="mode_comment">mode_comment</span>
</div>
<span class="font-label-caps text-label-caps text-white">128</span>
</div>
<div class="flex flex-col items-center gap-1 group cursor-pointer active:scale-95 duration-200">
<div class="p-3 rounded-full bg-white/5 backdrop-blur-md border border-white/10 group-hover:border-primary/50 transition-all">
<span class="material-symbols-outlined text-white icon-glow" data-icon="send">send</span>
</div>
<span class="font-label-caps text-label-caps text-white">Share</span>
</div>

<span class="px-3 py-1 rounded-full border border-white/20 bg-white/5 backdrop-blur-md font-label-caps text-label-caps text-on-surface">AFTER EFFECTS</span>
